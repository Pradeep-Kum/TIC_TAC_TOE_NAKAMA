version: '3'

services:
  postgres:
    image: postgres:12
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      - postgres
    command:
      - "--name"
      - "nakama1"
      - "--database.address"
      - "postgres:localdb@postgres:5432/nakama"
      - "--logger.level"
      - "DEBUG"
    ports:
      - "7350:7350"
      - "7351:7351"
    volumes:
    - ./modules/build:/nakama/data/modules